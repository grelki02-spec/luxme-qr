<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUXME Experience</title>

<style>
body{
margin:0;
padding:18px;
background:#e9e9ec;
font-family:Georgia, serif;
color:#2f2b28;
}

.page{
max-width:560px;
margin:auto;
background:#ece6dd;
padding:30px 26px 0 26px;
}

h1{
text-align:center;
font-size:24px;
margin-bottom:20px;
white-space:nowrap;
}

.intro{
text-align:justify;
font-size:14px;
line-height:1.7;
margin-bottom:25px;
}

.section{
margin-bottom:18px;
}

.title{
font-size:12px;
letter-spacing:3px;
font-weight:bold;
text-transform:uppercase;
margin-bottom:6px;
}

.item{
font-size:13px;
margin:2px 0;
}

.note{
text-align:center;
margin:16px 0 8px 0;
font-size:12px;
font-style:italic;
}

.contact{
text-align:center;
margin:8px 0 18px 0;
font-size:12px;
}

.contact a{
color:inherit;
text-decoration:none;
border-bottom:1px solid rgba(0,0,0,0.3);
}

.image-box{
position:relative;
margin:0 -26px;
}

.main-image{
width:100%;
display:block;
opacity:0.45;
}

.logo{
position:absolute;
bottom:18px;
left:50%;
transform:translateX(-50%);
width:100px;
}

@media(max-width:600px){
h1{white-space:normal;font-size:20px;}
.intro{font-size:13px;}
.item{font-size:12px;}
}
</style>
</head>

<body>

<div class="page">

<h1 id="title"></h1>

<div class="intro" id="desc"></div>

<div class="section">
<div class="title">LAGOON - MAIN RESTAURANT</div>
<div id="restaurant"></div>
</div>

<div class="section">
<div class="title">FOOD COURT</div>
<div id="food"></div>
</div>

<div class="section">
<div class="title">A LA CARTE RESTAURANTS*</div>
<div id="alacarte"></div>
</div>

<div class="section">
<div class="title">BARS</div>
<div id="bars"></div>
</div>

<div class="section">
<div class="title">WELLNESS & ACTIVITIES</div>
<div id="wellness"></div>
</div>

<div class="note" id="note"></div>
<div class="contact" id="contact"></div>

<div class="image-box">
<img src="hotel.jpg" class="main-image">
<img src="LOGO.png" class="logo">
</div>

</div>

<script>
fetch('data.json')
.then(res=>res.json())
.then(data=>{

document.getElementById('title').innerText=data.title;
document.getElementById('desc').innerText=data.description;

function fill(id,arr){
let el=document.getElementById(id);
el.innerHTML="";
if(!arr) return;
arr.forEach(item=>{
el.innerHTML+="<div class='item'>"+item+"</div>";
});
}

fill("restaurant",data.main_restaurant);
fill("food",data.food_court);
fill("alacarte",data.alacarte);
fill("bars",data.bars);
fill("wellness",data.wellness);

document.getElementById('note').innerText=data.note;

document.getElementById('contact').innerHTML =
'Contact us via WhatsApp: <a href="https://wa.me/' + data.whatsapp + '">' + data.phone + '</a>';

});
</script>

</body>
</html>
