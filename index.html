<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUXME Experience</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #e9e9ec;
      font-family: Georgia, "Times New Roman", serif;
      color: #2f2b28;
    }

    .page {
      max-width: 720px;
      margin: 0 auto;
      background: #ece6dd;
      padding: 34px 34px 0 34px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 26px 0;
      text-align: center;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 700;
      color: #1f1b18;
      white-space: nowrap;
    }

    .intro {
      text-align: justify;
      font-size: 14px;
      line-height: 1.7;
      letter-spacing: 0.2px;
      margin: 0 auto 28px auto;
      max-width: 560px;
    }

    .section {
      margin: 0 0 20px 0;
    }

    .section-title {
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 700;
      margin: 0 0 6px 0;
    }

    .item {
      font-size: 13px;
      line-height: 1.45;
      margin: 0;
    }

    .contact {
      text-align: center;
      font-size: 12px;
      margin: 18px 0 22px 0;
    }

    .image-box {
      position: relative;
      margin: 0 -34px 0 -34px;
    }

    .main-image {
      width: 100%;
      display: block;
      opacity: 0.45;
    }

    .logo-overlay {
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      width: 95px;
      height: auto;
    }

    @media (max-width: 760px) {
      body {
        padding: 12px;
      }

      .page {
        max-width: 100%;
        padding: 24px 20px 0 20px;
      }

      h1 {
        font-size: 20px;
        white-space: normal;
      }

      .intro {
        font-size: 13px;
        line-height: 1.6;
        max-width: 100%;
        margin-bottom: 24px;
      }

      .section-title {
        font-size: 11px;
        letter-spacing: 2.5px;
      }

      .item {
        font-size: 12px;
      }

      .contact {
        font-size: 11px;
      }

      .image-box {
        margin: 0 -20px 0 -20px;
      }

      .logo-overlay {
        width: 78px;
        bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1 id="title"></h1>

    <div class="intro" id="desc"></div>

    <div class="section">
      <div class="section-title">MAIN RESTAURANT</div>
      <div id="restaurant"></div>
    </div>

    <div class="section">
      <div class="section-title">FOOD COURT</div>
      <div id="food"></div>
    </div>

    <div class="section">
      <div class="section-title">A LA CARTE RESTAURANTS</div>
      <div id="alacarte"></div>
    </div>

    <div class="section">
      <div class="section-title">BARS</div>
      <div id="bars"></div>
    </div>

    <div class="section">
      <div class="section-title">WELLNESS & ACTIVITIES</div>
      <div id="wellness"></div>
    </div>

    <div class="contact" id="contact"></div>

    <div class="image-box">
      <img src="hotel.jpg" alt="Hotel View" class="main-image">
      <img src="logo.png" alt="LUXME Logo" class="logo-overlay">
    </div>
  </div>

  <script>
    fetch('data.json')
      .then(function(res) {
        return res.json();
      })
      .then(function(data) {
        document.getElementById('title').textContent = data.title || '';
        document.getElementById('desc').textContent = data.description || '';

        function fill(id, arr) {
          var el = document.getElementById(id);
          el.innerHTML = '';
          if (!arr || !arr.length) return;

          arr.forEach(function(item) {
            var row = document.createElement('div');
            row.className = 'item';
            row.textContent = item;
            el.appendChild(row);
          });
        }

        fill('restaurant', data.main_restaurant);
        fill('food', data.food_court);
        fill('alacarte', data.alacarte);
        fill('bars', data.bars);
        fill('wellness', data.wellness);

        document.getElementById('contact').textContent =
          'Contact via WhatsApp: ' + (data.contact || '');
      })
      .catch(function(error) {
        console.error('Error loading data.json:', error);
      });
  </script>
</body>
</html>
